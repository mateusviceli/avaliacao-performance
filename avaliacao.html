<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Avaliação de Performance</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Header dinâmico -->
<header class="hdr bg-navy" id="hdr">
  <div class="hdr-brand">
    <div class="hdr-logo" id="hdr-logo">📋</div>
    <div>
      <div class="hdr-title" id="hdr-title">Avaliação de Performance</div>
      <span class="hdr-sub" id="hdr-sub">Carregando...</span>
    </div>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <span id="hdr-ciclo" style="color:rgba(255,255,255,.7);font-size:12px"></span>
    <button class="hdr-pill" onclick="location.href='consulta.html'">← Consultar avaliações</button>
  </div>
</header>

<div class="wrap" id="main-wrap">

  <!-- Timeline -->
  <div class="timeline" id="timeline"></div>

  <!-- Banner de papel -->
  <div id="role-banner"></div>

  <!-- Telas dinâmicas -->
  <div id="form-screen">
    <div class="prog-wrap">
      <div class="prog-label"><span id="prog-txt">Preenchimento em andamento</span><span id="prog-pct">0%</span></div>
      <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
    </div>
    <form id="form" novalidate></form>
  </div>

  <div class="success-screen" id="success-screen">
    <div class="success-icon" id="suc-icon">✅</div>
    <h2 id="suc-title">Etapa concluída!</h2>
    <p id="suc-msg">Sua parte foi salva com sucesso.</p>
    <button class="btn btn-primary" onclick="location.href='consulta.html'">Ver todas as avaliações</button>
  </div>

</div>
<div id="toast"></div>

<script src="config.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════
let AV = null;       // avaliação carregada do Supabase
let PAPEL = null;    // 'gp' | 'gc' | 'colaborador'
let objCount = 0;
let podeTreinar = null;
let compConfig = []; // competências configuradas para esta avaliação

const VALS = [4, 3, 2, 1];
const LBLS = ['acima','dentro','em_desenvolvimento','nao_atende'];
const LBLS_TXT = ['Acima do esperado','Dentro do esperado','Em desenvolvimento','Não atende'];

// ═══════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', async () => {
  const avId  = urlParam('id');
  const codigoBruto = urlParam('c');   // código de acesso do colaborador ou gc

  if (!avId) { mostrarErro('Link inválido. Nenhuma avaliação especificada.'); return; }

  try {
    const rows = await SB.get('avaliacoes', `?id=eq.${avId}`);
    if (!rows.length) { mostrarErro('Avaliação não encontrada.'); return; }
    AV = rows[0];
    compConfig = AV.competencias_config || [];

    // Determina o papel pelo código de acesso
    if (codigoBruto === AV.codigo_gp) {
      PAPEL = 'gp';
    } else if (codigoBruto === AV.codigo_gc) {
      PAPEL = 'gc';
    } else if (codigoBruto === AV.codigo_colaborador) {
      PAPEL = 'colaborador';
    } else {
      mostrarErro('Código de acesso inválido. Verifique o link recebido.');
      return;
    }

    renderTimeline();
    renderBanner();
    renderForm();

  } catch (e) {
    console.error(e);
    mostrarErro('Erro ao carregar a avaliação. Verifique a conexão.');
  }
});

// ═══════════════════════════════════════════════════════════════════
// TIMELINE
// ═══════════════════════════════════════════════════════════════════
function renderTimeline() {
  const etapa = AV.etapa_atual;
  const concluida = AV.status === 'concluida';
  const steps = [
    { n:1, lbl:'Criação\n(Gestor Projeto)' },
    { n:2, lbl:'Avaliação\n(Gestor Cliente)' },
    { n:3, lbl:'Colaborador' },
    { n:4, lbl:'Revisão Final\n(Gestor Projeto)' },
  ];
  const tl = document.getElementById('timeline');
  tl.innerHTML = '';
  steps.forEach((s, i) => {
    const done = concluida || s.n < etapa;
    const active = !concluida && s.n === etapa;
    const col = document.createElement('div'); col.className = 'tl-col';
    col.innerHTML = `<div class="tl-dot${done?' done':active?' active':''}">
      ${done ? '✓' : s.n}</div>
      <div class="tl-label${active?' active':done?' done':''}">${s.lbl}</div>`;
    tl.appendChild(col);
    if (i < steps.length - 1) {
      const line = document.createElement('div');
      line.className = `tl-line${done?' done':''}`;
      line.style.marginBottom = '18px';
      tl.appendChild(line);
    }
  });
  // atualiza header
  document.getElementById('hdr-ciclo').textContent = AV.ciclo || '';
}

// ═══════════════════════════════════════════════════════════════════
// BANNER
// ═══════════════════════════════════════════════════════════════════
function renderBanner() {
  const etapa = AV.etapa_atual;
  const status = AV.status;
  const banners = {
    gp: { cls:'rb-gp', icon:'👔', titulo:'Gestor do Projeto', sub: status==='concluida'
      ? 'Esta avaliação foi concluída. Visualizando em modo leitura.'
      : etapa===1 ? 'Etapa 1 — Preencha as informações iniciais e defina as competências.'
      : etapa>=4 ? 'Etapa 4 — Revise tudo e finalize a avaliação.'
      : 'Visualização — aguardando preenchimento das outras etapas.' },
    gc: { cls:'rb-gc', icon:'🏢', titulo:'Gestor do Cliente', sub: etapa===2
      ? 'Etapa 2 — Avalie as competências e preencha o feedback do colaborador.'
      : etapa<2 ? 'Esta avaliação ainda não chegou à sua etapa. Aguarde o Gestor do Projeto.'
      : 'Você já preencheu sua parte. Obrigado!' },
    colaborador: { cls:'rb-col', icon:'🙋', titulo:'Colaborador', sub: etapa===3
      ? 'Etapa 3 — Você pode visualizar a avaliação, complementar o feedback e comentar em cada seção.'
      : etapa<3 ? 'Esta avaliação ainda não chegou à sua etapa. Aguarde.'
      : 'Você já preencheu sua parte. Obrigado!' },
  };
  const b = banners[PAPEL];
  document.getElementById('role-banner').innerHTML = `
    <div class="role-banner ${b.cls}">
      <div class="rb-icon">${b.icon}</div>
      <div><div class="rb-title">${b.titulo}</div><div class="rb-sub">${b.sub}</div></div>
    </div>`;
}

// ═══════════════════════════════════════════════════════════════════
// RENDER FORM — decide o que mostrar baseado em etapa + papel
// ═══════════════════════════════════════════════════════════════════
function renderForm() {
  const etapa = AV.etapa_atual;
  const status = AV.status;
  const form = document.getElementById('form');
  form.innerHTML = '';

  // GP — etapa 1
  if (PAPEL === 'gp' && etapa === 1) {
    renderEtapa1GP(form);
    return;
  }

  // GC — etapa 2
  if (PAPEL === 'gc' && etapa === 2) {
    renderEtapa2GC(form);
    return;
  }

  // Colaborador — etapa 3
  if (PAPEL === 'colaborador' && etapa === 3) {
    renderEtapa3Colaborador(form);
    return;
  }

  // GP — revisão final (etapa 4 ou status concluida)
  if (PAPEL === 'gp' && (etapa === 4 || status === 'concluida')) {
    renderEtapa4Revisao(form);
    return;
  }

  // Qualquer outro estado: visualização somente leitura
  renderVisualizacao(form);
}

// ═══════════════════════════════════════════════════════════════════
// ETAPA 1 — Gestor do Projeto cria a avaliação
// ═══════════════════════════════════════════════════════════════════
function renderEtapa1GP(form) {
  document.getElementById('hdr-title').textContent = 'Etapa 1 — Criação';
  document.getElementById('hdr-logo').textContent = '📝';

  form.innerHTML = `
    ${secHdr('ci-navy','📋','Dados do Colaborador','Informações gerais para identificação')}
    <div class="card-body">
      <div class="row2">
        <div class="field"><label>Colaborador <span class="req">*</span></label>
          <input id="colaborador" placeholder="Nome completo" required /></div>
        <div class="field"><label>Função / Cargo <span class="req">*</span></label>
          <input id="funcao" placeholder="Ex: Analista de Supply" required /></div>
      </div>
      <div class="row3">
        <div class="field"><label>Cliente / Projeto</label>
          <input id="cliente" placeholder="Ex: CEVA, Bosch..." /></div>
        <div class="field"><label>Ciclo <span class="req">*</span></label>
          <input id="ciclo" value="${AV.ciclo||''}" required /></div>
        <div class="field"><label>Time / BU</label>
          <input id="time" value="${AV.time||''}" /></div>
      </div>
    </div>
    ${secHdr('ci-blue','⭐','Competências avaliadas',
      'Defina as competências específicas para este colaborador/time. O Gestor do Cliente avaliará cada uma.')}
    <div class="card-body">
      <div class="infonote in-blue">
        💡 Você pode personalizar as competências para este time. As alterações valem somente para esta avaliação.
      </div>
      <div id="comp-list"></div>
      <div class="comp-add-row">
        <input id="nova-comp" placeholder="Ex: Comunicação clara e objetiva com o time" />
        <button type="button" class="btn btn-secondary btn-sm" onclick="addComp()">+ Adicionar</button>
      </div>
    </div>
    ${secHdr('ci-green','🎯','Objetivos para o período','Metas definidas pelo Gestor do Projeto')}
    <div class="card-body">
      <div id="obj-list"></div>
      <button type="button" class="btn-add-obj" id="btn-add-obj">+ Adicionar objetivo</button>
    </div>
    ${secHdr('ci-amber','📝','Observações iniciais','Contexto ou instruções para o Gestor do Cliente (opcional)')}
    <div class="card-body">
      <div class="field row1">
        <div class="field"><label>Observações</label>
          <textarea id="obs_gp" placeholder="Contexto do período, pontos a observar...">${AV.etapa1_dados?.obs_gp||''}</textarea>
        </div>
      </div>
    </div>
    <div class="form-actions">
      <button type="button" class="btn btn-secondary" onclick="salvarRascunho()">💾 Salvar rascunho</button>
      <button type="submit" class="btn btn-primary" id="btn-submit">Avançar para Gestor do Cliente →</button>
    </div>`;

  // Preenche campos salvos
  const d = AV.etapa1_dados || {};
  if (d.colaborador) document.getElementById('colaborador').value = d.colaborador;
  if (d.funcao) document.getElementById('funcao').value = d.funcao;
  if (d.cliente) document.getElementById('cliente').value = d.cliente;

  // Competências salvas ou padrão
  compConfig = AV.competencias_config?.length ? AV.competencias_config : [
    'Relacionamento interpessoal',
    'Responsabilidade',
    'Solução de Problemas',
    'Administração de conflitos',
    'Iniciativa e empreendedorismo',
  ];
  renderCompList();

  // Objetivos
  const objs = d.objetivos || [];
  if (objs.length) objs.forEach(o => addObj(o));
  else { addObj(); addObj(); addObj(); }

  document.getElementById('btn-add-obj').addEventListener('click', () => addObj());
  document.getElementById('nova-comp').addEventListener('keypress', e => { if (e.key==='Enter'){e.preventDefault();addComp();} });

  form.addEventListener('submit', e => { e.preventDefault(); submitEtapa1(); });
  document.getElementById('form').addEventListener('input', updateProg);
}

function secHdr(iconCls, emoji, title, sub) {
  return `<div class="card" style="margin-bottom:0;border-radius:var(--r) var(--r) 0 0;border-bottom:none">
    <div class="card-hdr">
      <div class="card-icon ${iconCls}">${emoji}</div>
      <div><div class="card-title">${title}</div><div class="card-sub">${sub}</div></div>
    </div></div>
    <div class="card" style="border-radius:0 0 var(--r) var(--r);margin-bottom:18px">`;
}

function renderCompList() {
  const el = document.getElementById('comp-list');
  el.innerHTML = '';
  compConfig.forEach((c, i) => {
    const d = document.createElement('div'); d.className = 'comp-config-item';
    d.innerHTML = `<span>${i+1}. ${c}</span>
      <button type="button" class="btn-del-comp" onclick="removeComp(${i})" title="Remover">×</button>`;
    el.appendChild(d);
  });
}
function addComp() {
  const inp = document.getElementById('nova-comp');
  const v = inp.value.trim(); if (!v) return;
  compConfig.push(v); renderCompList(); inp.value = '';
}
function removeComp(i) { compConfig.splice(i,1); renderCompList(); }

let objCount2 = 0;
function addObj(val = '') {
  objCount2++;
  const list = document.getElementById('obj-list');
  const d = document.createElement('div'); d.className = 'obj-item'; d.id = `obj-${objCount2}`;
  d.innerHTML = `<div class="obj-num">${list.children.length+1}</div>
    <input type="text" placeholder="Descreva o objetivo..." value="${val}" />
    <button type="button" class="btn-del-obj" onclick="removeObj('obj-${objCount2}')" title="Remover">×</button>`;
  list.appendChild(d); renumObjs();
}
function removeObj(id) {
  if (document.getElementById('obj-list').children.length <= 1) return;
  document.getElementById(id)?.remove(); renumObjs();
}
function renumObjs() {
  document.querySelectorAll('#obj-list .obj-num').forEach((el,i)=>el.textContent=i+1);
}

async function salvarRascunho() {
  const body = coletarEtapa1Dados(false);
  try {
    await SB.patch('avaliacoes', AV.id, { etapa1_dados: body, competencias_config: compConfig });
    AV.etapa1_dados = body; AV.competencias_config = compConfig;
    showToast('Rascunho salvo!');
  } catch(e) { showToast('Erro ao salvar.','error'); }
}

function coletarEtapa1Dados(strict=true) {
  return {
    colaborador: document.getElementById('colaborador').value.trim(),
    funcao: document.getElementById('funcao').value.trim(),
    cliente: document.getElementById('cliente').value.trim(),
    ciclo: document.getElementById('ciclo').value.trim(),
    time: document.getElementById('time').value.trim(),
    obs_gp: document.getElementById('obs_gp').value.trim(),
    objetivos: Array.from(document.querySelectorAll('#obj-list input')).map(i=>i.value.trim()).filter(Boolean),
  };
}

async function submitEtapa1() {
  const d = coletarEtapa1Dados(true);
  if (!d.colaborador || !d.funcao || !d.ciclo) {
    showToast('Preencha os campos obrigatórios.','error'); return;
  }
  if (compConfig.length < 1) { showToast('Adicione ao menos uma competência.','error'); return; }
  const btn = document.getElementById('btn-submit');
  btn.disabled = true; btn.textContent = 'Salvando...';
  try {
    await SB.patch('avaliacoes', AV.id, {
      etapa1_dados: d, competencias_config: compConfig,
      colaborador: d.colaborador, funcao: d.funcao,
      cliente: d.cliente, ciclo: d.ciclo, time: d.time,
      etapa_atual: 2, status: 'em_andamento',
      atualizado_em: new Date().toISOString(),
    });
    document.getElementById('form-screen').style.display = 'none';
    const ss = document.getElementById('success-screen');
    ss.style.display = 'block';
    document.getElementById('suc-title').textContent = 'Etapa 1 concluída!';
    document.getElementById('suc-msg').textContent =
      'A avaliação foi criada. Compartilhe o link do Gestor do Cliente para prosseguir.';
    document.getElementById('suc-icon').textContent = '🎉';
  } catch(e) {
    showToast('Erro ao avançar.','error');
    btn.disabled = false; btn.textContent = 'Avançar para Gestor do Cliente →';
  }
}

// ═══════════════════════════════════════════════════════════════════
// ETAPA 2 — Gestor do Cliente avalia
// ═══════════════════════════════════════════════════════════════════
function renderEtapa2GC(form) {
  document.getElementById('hdr-title').textContent = 'Etapa 2 — Avaliação do Gestor do Cliente';
  document.getElementById('hdr').className = 'hdr bg-green';
  document.getElementById('hdr-logo').textContent = '🏢';

  const d1 = AV.etapa1_dados || {};
  const d2 = AV.etapa2_dados || {};

  form.innerHTML = `
    <!-- Dados do colaborador (somente leitura) -->
    <div class="card">
      <div class="card-hdr"><div class="card-icon ci-navy">👤</div>
        <div><div class="card-title">Colaborador avaliado</div><div class="card-sub">Informações da etapa de criação</div></div>
      </div>
      <div class="card-body">
        <div class="row2">
          <div class="readonly-row"><span class="ro-label">Nome</span><span class="ro-val">${d1.colaborador||'—'}</span></div>
          <div class="readonly-row"><span class="ro-label">Função</span><span class="ro-val">${d1.funcao||'—'}</span></div>
        </div>
        <div class="row2" style="margin-top:8px">
          <div class="readonly-row"><span class="ro-label">Cliente / Projeto</span><span class="ro-val">${d1.cliente||'—'}</span></div>
          <div class="readonly-row"><span class="ro-label">Ciclo</span><span class="ro-val">${AV.ciclo||'—'}</span></div>
        </div>
        ${d1.obs_gp ? `<div class="infonote in-blue" style="margin-top:12px">
          📌 <strong>Observações do Gestor do Projeto:</strong> ${d1.obs_gp}</div>` : ''}
      </div>
    </div>

    <!-- Competências -->
    <div class="card">
      <div class="card-hdr"><div class="card-icon ci-blue">⭐</div>
        <div><div class="card-title">Avaliação de Competências</div>
          <div class="card-sub">Avalie cada competência — sua avaliação é privada até a revisão final</div></div>
      </div>
      <div class="card-body">
        <div class="legenda">
          <div class="leg-item"><div class="leg-dot" style="background:#059669"></div>Acima do esperado (4)</div>
          <div class="leg-item"><div class="leg-dot" style="background:#2563EB"></div>Dentro do esperado (3)</div>
          <div class="leg-item"><div class="leg-dot" style="background:#D97706"></div>Em desenvolvimento (2)</div>
          <div class="leg-item"><div class="leg-dot" style="background:#DC2626"></div>Não atende (1)</div>
        </div>
        <table class="comp-table"><thead><tr>
          <th>Competência</th><th>Acima</th><th>Dentro</th><th>Em desenv.</th><th>Não atende</th><th>Média</th>
        </tr></thead><tbody id="comp-body"></tbody></table>
      </div>
    </div>

    <!-- Avaliação geral -->
    <div class="card">
      <div class="card-hdr"><div class="card-icon ci-green">📊</div>
        <div><div class="card-title">Avaliação Geral</div><div class="card-sub">Qualidade, prazo e satisfação</div></div>
      </div>
      <div class="card-body">
        <table class="comp-table"><thead><tr>
          <th>Critério</th><th>Acima</th><th>Dentro</th><th>Em desenv.</th><th>Não atende</th><th>Média</th>
        </tr></thead><tbody id="geral-body"></tbody></table>
      </div>
    </div>

    <!-- Feedback qualitativo -->
    <div class="card" id="sec-feedback">
      <div class="card-hdr"><div class="card-icon ci-amber">💬</div>
        <div><div class="card-title">Feedback Qualitativo</div>
          <div class="card-sub">Pontos positivos e áreas de desenvolvimento — o colaborador poderá comentar nesta seção</div></div>
      </div>
      <div class="card-body">
        <div class="field"><label>Pontos positivos</label>
          <textarea id="pontos_pos" placeholder="Descreva os pontos fortes observados no período...">${d2.pontos_pos||''}</textarea></div>
        <div class="field"><label>Pontos a desenvolver</label>
          <textarea id="pontos_dev" placeholder="Descreva as áreas de melhoria esperadas...">${d2.pontos_dev||''}</textarea></div>
      </div>
    </div>

    <!-- Treinamentos -->
    <div class="card">
      <div class="card-hdr"><div class="card-icon ci-amber">🎓</div>
        <div><div class="card-title">Treinamentos</div><div class="card-sub">Capacitações do colaborador</div></div>
      </div>
      <div class="card-body">
        <div class="field" style="margin-bottom:14px"><label>O colaborador pode ministrar treinamentos?</label>
          <div class="toggle-group" id="treinar-grp">
            <button type="button" class="tgl-btn" data-v="sim" onclick="tglTreinar(this)">✅ Sim</button>
            <button type="button" class="tgl-btn" data-v="nao" onclick="tglTreinar(this)">❌ Não</button>
          </div></div>
        <div id="ferramentas-wrap" style="display:none" class="field">
          <label>Quais ferramentas pode ensinar?</label>
          <input id="ferramentas" placeholder="Ex: Excel, SAP, Power BI..." value="${d2.ferramentas||''}" /></div>
        <div class="field"><label>Treinamentos recebidos no período</label>
          <textarea id="treinamentos" placeholder="Liste os treinamentos realizados...">${d2.treinamentos||''}</textarea></div>
      </div>
    </div>

    <!-- Feedback -->
    <div class="card">
      <div class="card-hdr"><div class="card-icon ci-green">🤝</div>
        <div><div class="card-title">Entrevista Individual — Feedback</div><div class="card-sub">Como o feedback será conduzido</div></div>
      </div>
      <div class="card-body">
        <div class="fb-options">
          <label class="fb-opt"><input type="radio" name="feedback_modo" value="simultaneo" ${d2.feedback_modo==='simultaneo'?'checked':''} />
            <div><div class="fb-opt-lbl">Feedback com o colaborador e o RH Segula simultaneamente</div>
              <div class="fb-opt-sub">Ambos participam da conversa ao mesmo tempo</div></div></label>
          <label class="fb-opt"><input type="radio" name="feedback_modo" value="apenas_rh" ${d2.feedback_modo==='apenas_rh'?'checked':''} />
            <div><div class="fb-opt-lbl">Feedback apenas para o RH, que repassa ao colaborador</div>
              <div class="fb-opt-sub">O RH intermediará a comunicação</div></div></label>
        </div>
      </div>
    </div>

    <div class="form-actions">
      <button type="button" class="btn btn-secondary" onclick="salvarRascunhoGC()">💾 Salvar rascunho</button>
      <button type="submit" class="btn btn-success" id="btn-submit">Concluir e enviar para Colaborador →</button>
    </div>`;

  // Monta tabelas
  buildCompTable('comp-body', compConfig, 'comp', d2.competencias || {});
  buildCompTable('geral-body', [
    'Qualidade — Avalie a qualidade geral das atividades entregues.',
    'Prazo de entrega (Deadline) — Cumprimento dos prazos definidos.',
    'Nível de satisfação — Avaliação geral do serviço prestado.',
  ], 'geral', d2.avaliacao_geral || {});

  // Pode treinar
  if (d2.pode_treinar) {

function buildCompTable(tbodyId, items, prefix, savedVals) {
  const tbody = document.getElementById(tbodyId);
  items.forEach((item, idx) => {
    const tr = document.createElement('tr');
    const td0 = document.createElement('td'); td0.textContent = item; tr.appendChild(td0);
    LBLS.forEach((lbl, col) => {
      const td = document.createElement('td'); td.setAttribute('data-col', col);
      const uid = `${prefix}_${idx}_${lbl}`;
      const saved = savedVals[`${prefix}_${idx}`];
      const checked = saved === VALS[col] ? 'checked' : '';
      td.innerHTML = `<div class="rv" data-col="${col}">
        <input type="radio" name="${prefix}_${idx}" id="${uid}" value="${VALS[col]}" ${checked} />
        <label for="${uid}" title="${LBLS_TXT[col]}"></label></div>`;
      td.addEventListener('change', () => updateMediaCell(prefix, idx));
      tr.appendChild(td);
    });
    const tdM = document.createElement('td'); tdM.className='media-cell'; tdM.id=`m_${prefix}_${idx}`;
    if (savedVals[`${prefix}_${idx}`] != null) {
      const v = savedVals[`${prefix}_${idx}`];
      tdM.textContent = v.toFixed(1);
      tdM.style.color = {4:'#059669',3:'#2563EB',2:'#D97706',1:'#DC2626'}[v];
    } else { tdM.textContent='—'; }
    tr.appendChild(tdM);
    tbody.appendChild(tr);
  });
}

function updateMediaCell(prefix, idx) {
  const sel = document.querySelector(`input[name="${prefix}_${idx}"]:checked`);
  const el = document.getElementById(`m_${prefix}_${idx}`);
  if (!sel || !el) return;
  const v = parseFloat(sel.value);
  el.textContent = v.toFixed(1);
  el.style.color = {4:'#059669',3:'#2563EB',2:'#D97706',1:'#DC2626'}[v];
}

function tglTreinar(btn) {
  document.querySelectorAll('#treinar-grp .tgl-btn').forEach(b=>b.className='tgl-btn');
  podeTreinar = btn.dataset.v;
  btn.classList.add(podeTreinar==='sim'?'tgl-sim':'tgl-nao');
  document.getElementById('ferramentas-wrap').style.display = podeTreinar==='sim'?'block':'none';
}

function coletarRadios(prefix, count) {
  const r = {};
  for (let i = 0; i < count; i++) {
    const sel = document.querySelector(`input[name="${prefix}_${i}"]:checked`);
    r[`${prefix}_${i}`] = sel ? parseFloat(sel.value) : null;
  }
  return r;
}

    pontos_dev: document.getElementById('rev_pontos_dev').value.trim(),
  };
  try {
    await SB.patch('avaliacoes', AV.id, {
      etapa4_dados: d4, status: 'concluida',
      concluida_em: new Date().toISOString(),
      atualizado_em: new Date().toISOString(),
    });
    document.getElementById('form-screen').style.display='none';
    const ss=document.getElementById('success-screen');
    ss.style.display='block';
    document.getElementById('suc-title').textContent='Avaliação finalizada!';
    document.getElementById('suc-msg').textContent='A avaliação foi concluída e registrada com sucesso.';
    document.getElementById('suc-icon').textContent='🏆';
  } catch(e) {
    showToast('Erro ao finalizar.','error');
    btn.disabled=false; btn.textContent='✅ Finalizar avaliação';
  }
}

// ═══════════════════════════════════════════════════════════════════
// VISUALIZAÇÃO (leitura — etapa errada ou já preenchida)

  const d1 = AV.etapa1_dados||{}, d2 = AV.etapa2_dados||{};
  const etapa = AV.etapa_atual;
  form.innerHTML = `
    <div class="infonote in-amber">
      ℹ️ Esta avaliação está na <strong>Etapa ${etapa}</strong>.
      ${PAPEL==='gc' && etapa!==2 ? 'Você já preencheu sua parte ou esta etapa ainda não chegou até você.' :
        PAPEL==='colaborador' && etapa!==3 ? 'Você já preencheu sua parte ou esta etapa ainda não chegou até você.' : ''}
    </div>
    <div class="card">
      <div class="card-hdr"><div class="card-icon ci-navy">👤</div>
        <div><div class="card-title">${d1.colaborador||'Colaborador'}</div>
        <div class="card-sub">${d1.funcao||''} · ${AV.ciclo||''}</div></div>
        <span class="etapa-badge ${statusLabel(etapa,AV.status).cls}">${statusLabel(etapa,AV.status).txt}</span>
      </div>
      ${etapa >= 2 && Object.keys(d2).length ? `<div class="card-body">
        <div class="readonly-row"><span class="ro-label">Média de competências</span>
          <span class="nota-badge ${notaCls(d2.media_competencias)}">${d2.media_competencias?.toFixed(1)||'—'}</span></div>
        <div class="readonly-row"><span class="ro-label">Média geral</span>
          <span class="nota-badge ${notaCls(d2.media_geral)}">${d2.media_geral?.toFixed(1)||'—'}</span></div>
      </div>` : ''}
    </div>`;
}

// ═══════════════════════════════════════════════════════════════════
// PROGRESS BAR
// ═══════════════════════════════════════════════════════════════════
function updateProg() {
  const reqs = document.querySelectorAll('input[required],select[required]');
  const filled = Array.from(reqs).filter(el => el.value.trim()).length;
  const radios = new Set();
  document.querySelectorAll('input[type=radio]').forEach(r => radios.add(r.name));
  let radioF = 0;
  radios.forEach(n => { if (document.querySelector(`input[name="${n}"]:checked`)) radioF++; });
  const total = reqs.length + radios.size, done = filled + radioF;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('prog-pct').textContent = pct+'%';
  document.getElementById('prog-txt').textContent =
    pct===100 ? 'Tudo preenchido!' : pct>50 ? 'Quase lá...' : 'Preenchimento em andamento';
}

    </div>`;
}
